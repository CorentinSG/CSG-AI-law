name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly drift check: catches slow breakage (dependency rot, source
    # changes) between human pushes.
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Tests run in memory mode; no real secrets are required. The values below are
# obvious non-secret placeholders that only satisfy env validation so the
# production build (`next build` sets NODE_ENV=production) does not fail on a
# missing data mode / admin secret. They are NOT credentials.
env:
  APP_DATA_MODE: memory
  ALLOW_MEMORY_MODE_IN_PRODUCTION: "true"
  ADMIN_AUTH_SECRET: ci-placeholder-admin-secret-000000
  # Non-default admin creds: the production build rejects the admin/change-me
  # defaults, so the build step needs these placeholders too.
  ADMIN_USERNAME: ci-placeholder-admin
  ADMIN_PASSWORD: ci-placeholder-admin-password-000000
  CRON_SECRET: ci-placeholder-cron-secret-0000

jobs:
  migration-integrity:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Enforce migration immutability
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $parent = '${{ github.event.pull_request.base.sha }}'
          } elseif ('${{ github.event.before }}' -match '^0+$') {
            $parent = git rev-list --max-parents=0 --reverse HEAD | Select-Object -First 1
          } else {
            $parent = '${{ github.event.before }}'
          }
          $mergeBase = git merge-base $parent HEAD
          node scripts/check-migration-immutability.mjs --base $mergeBase

  database-schema-audit:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_PRODUCTION_SCHEMA_AUDIT_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run audit:database-schema

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # e2e runs against the production build (playwright.config switches
      # its webServer to `next start` when CI is set).
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
